<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0f1724" />
    <title>PartyOn - Audio Stream Player</title>

    <style>
      :root {
        --accent1: #00e676;
        --accent2: #00c853;
        --glass: rgba(255, 255, 255, 0.06);
        --glass-2: rgba(255, 255, 255, 0.04);
        --text: #eef6f9;
        --spacing-xs: 8px;
        --spacing-sm: 12px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Poppins", Arial,
          sans-serif;
        background:
          radial-gradient(
            1000px 600px at 10% 20%,
            rgba(0, 0, 0, 0.18),
            transparent
          ),
          linear-gradient(135deg, #0f1724 0%, #1f1c2c 35%, #5b4666 100%);
        background-attachment: fixed;
        color: var(--text);
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        padding: var(--spacing-sm);
      }

      /* Decorative animated blobs */
      .blob {
        position: fixed;
        filter: blur(60px);
        opacity: 0.45;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 0;
      }

      .blob.b1 {
        width: 520px;
        height: 520px;
        background: linear-gradient(45deg, #8c6cff, #00e5ff);
        left: -10%;
        top: -15%;
      }

      .blob.b2 {
        width: 420px;
        height: 420px;
        background: linear-gradient(45deg, #00e676, #00c853);
        right: -8%;
        bottom: -20%;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        min-height: 100vh;
        position: relative;
        z-index: 2;
        width: 100%;
      }

      .card {
        width: 100%;
        max-width: 540px;
        padding: var(--spacing-lg);
        text-align: center;
        backdrop-filter: blur(12px) saturate(120%);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.02)
        );
        border-radius: var(--radius);
        box-shadow:
          0 30px 80px rgba(3, 6, 23, 0.65),
          inset 0 1px 0 rgba(255, 255, 255, 0.02);
        animation: fadeIn 0.6s ease;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      h1 {
        font-size: clamp(24px, 8vw, 32px);
        margin: 0 0 var(--spacing-xs) 0;
        font-weight: 700;
        letter-spacing: -0.4px;
      }

      .sub {
        font-size: clamp(12px, 4vw, 14px);
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: var(--spacing-md);
        line-height: 1.4;
      }

      .btn {
        padding: clamp(12px, 4vw, 16px) clamp(16px, 5vw, 20px);
        font-size: clamp(14px, 4vw, 16px);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      #playBtn {
        width: 100%;
        background: linear-gradient(90deg, var(--accent1), var(--accent2));
        color: #021009;
        box-shadow:
          0 8px 28px rgba(2, 200, 118, 0.12),
          0 2px 6px rgba(0, 0, 0, 0.35);
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-md);
      }

      #playBtn:active {
        transform: scale(0.98);
      }

      #playBtn:hover {
        box-shadow: 0 14px 40px rgba(2, 200, 118, 0.14);
      }

      #playBtn .icon {
        width: clamp(18px, 5vw, 24px);
        height: clamp(18px, 5vw, 24px);
        display: inline-block;
        flex-shrink: 0;
      }

      /* Control buttons row */
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-md);
      }

      .controls .btn {
        padding: clamp(10px, 3vw, 12px) clamp(12px, 4vw, 16px);
        font-size: clamp(12px, 3vw, 14px);
        background: var(--glass);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.08);
        width: 100%;
      }

      .controls .btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      /* Volume control */
      .volume-control {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-md);
        padding: 0;
      }

      .volume-control label {
        font-size: clamp(12px, 3vw, 13px);
        color: rgba(255, 255, 255, 0.7);
        white-space: nowrap;
        min-width: 60px;
      }

      .volume-control input[type="range"] {
        flex: 1;
        height: 6px;
        -webkit-appearance: none;
        appearance: none;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }

      .volume-control input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: clamp(14px, 3vw, 18px);
        height: clamp(14px, 3vw, 18px);
        background: var(--accent1);
        border-radius: 50%;
        cursor: pointer;
      }

      .volume-control input[type="range"]::-moz-range-thumb {
        width: clamp(14px, 3vw, 18px);
        height: clamp(14px, 3vw, 18px);
        background: var(--accent1);
        border-radius: 50%;
        cursor: pointer;
        border: none;
      }

      .status-text {
        margin: var(--spacing-md) 0;
        font-size: clamp(14px, 4vw, 16px);
      }

      #st {
        font-weight: 700;
        color: var(--accent1);
      }

      /* Visualizer canvas */
      #visualizer {
        width: 100%;
        height: clamp(50px, 20vw, 80px);
        margin-bottom: var(--spacing-md);
        border-radius: var(--radius);
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      /* Stats area */
      .stats-area {
        margin-bottom: var(--spacing-md);
        font-size: clamp(11px, 3vw, 12px);
        color: rgba(255, 255, 255, 0.5);
        cursor: help;
        user-select: none;
      }

      .stats-details {
        display: none;
        margin-top: var(--spacing-sm);
        padding: var(--spacing-sm);
        background: rgba(0, 0, 0, 0.3);
        border-radius: var(--radius);
        text-align: left;
        font-size: clamp(10px, 2.5vw, 11px);
        max-height: 120px;
        overflow-y: auto;
      }

      .stats-details div {
        margin: 4px 0;
        word-break: break-word;
      }

      .quality-good {
        color: var(--accent1);
      }

      .quality-degraded {
        color: #ffc107;
      }

      .quality-poor {
        color: #ff5252;
      }

      /* Ripple effect */
      #playBtn:after {
        content: "";
        position: absolute;
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.14);
        border-radius: 50%;
        transform: scale(0);
        opacity: 0;
        pointer-events: none;
        transition: 0.45s;
      }

      #playBtn:active:after {
        transform: scale(3.6);
        opacity: 1;
      }

      #errorContainer {
        margin-top: var(--spacing-md);
      }

      .error-msg {
        background: rgba(255, 82, 82, 0.1);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: #ff5252;
        padding: var(--spacing-sm);
        border-radius: var(--radius);
        font-size: clamp(12px, 3vw, 13px);
        word-break: break-word;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* Footer */
      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: var(--spacing-sm);
        display: flex;
        justify-content: center;
        z-index: 3;
        padding: var(--spacing-xs);
      }

      .footer-badge {
        background: var(--glass-2);
        backdrop-filter: blur(8px);
        border-radius: 999px;
        padding: clamp(6px, 3vw, 10px) clamp(10px, 4vw, 16px);
        border: 1px solid rgba(255, 255, 255, 0.03);
        display: inline-flex;
        gap: var(--spacing-sm);
        align-items: center;
        font-size: clamp(11px, 3vw, 13px);
        color: rgba(255, 255, 255, 0.9);
        flex-wrap: wrap;
        justify-content: center;
      }

      .footer-badge a {
        color: inherit;
        text-decoration: none;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      .gh {
        width: clamp(14px, 3vw, 18px);
        height: clamp(14px, 3vw, 18px);
        display: inline-block;
        flex-shrink: 0;
      }

      /* Responsive tweaks */
      @media (max-width: 768px) {
        body {
          padding: var(--spacing-xs);
        }

        .blob.b1 {
          width: 300px;
          height: 300px;
        }

        .blob.b2 {
          width: 250px;
          height: 250px;
        }

        .card {
          padding: var(--spacing-md);
          border-radius: 16px;
        }

        footer {
          bottom: var(--spacing-xs);
        }
      }

      @media (max-width: 480px) {
        body {
          padding: var(--spacing-xs);
          padding-bottom: 80px;
        }

        .card {
          padding: var(--spacing-md);
          border-radius: 12px;
        }

        .controls {
          grid-template-columns: repeat(2, 1fr);
        }

        .blob.b1 {
          width: 200px;
          height: 200px;
          left: -50px;
          top: -50px;
        }

        .blob.b2 {
          width: 180px;
          height: 180px;
          right: -60px;
          bottom: -60px;
        }

        footer {
          bottom: 60px;
        }
      }

      @media (max-width: 360px) {
        .controls {
          grid-template-columns: 1fr;
        }
      }

      /* Landscape mode */
      @media (max-height: 600px) and (orientation: landscape) {
        body {
          padding: var(--spacing-xs) var(--spacing-sm);
        }

        .card {
          padding: var(--spacing-md);
          max-height: 90vh;
          overflow-y: auto;
        }

        h1 {
          margin-bottom: 4px;
        }

        .sub {
          margin-bottom: 8px;
        }

        #visualizer {
          height: 40px;
          margin-bottom: 8px;
        }

        .controls {
          gap: 6px;
        }
      }

      /* Print styles */
      @media print {
        body,
        .blob,
        footer {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="blob b1" aria-hidden="true"></div>
    <div class="blob b2" aria-hidden="true"></div>

    <div class="container">
      <div class="card" role="region" aria-label="Audio Stream Player">
        <h1>PartyOn</h1>
        <div class="sub">
          Stream audio from your LAN server — click Play to connect
        </div>

        <button
          id="playBtn"
          class="btn"
          aria-pressed="false"
          title="Play Stream"
        >
          <svg
            class="icon"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path d="M5 3v18l15-9L5 3z" fill="#021009" />
          </svg>
          <span>Play Stream</span>
        </button>

        <div class="controls">
          <button id="pauseBtn" class="btn" title="Pause">Pause</button>
          <button id="stopBtn" class="btn" title="Stop">Stop</button>
          <button id="muteBtn" class="btn" title="Mute">Mute</button>
        </div>

        <div class="volume-control">
          <label for="volumeSlider">Volume:</label>
          <input
            type="range"
            id="volumeSlider"
            min="0"
            max="100"
            value="100"
            aria-label="Volume control"
          />
        </div>

        <canvas id="visualizer" aria-label="Audio visualization"></canvas>

        <div class="status-text">Status: <span id="st">Idle</span></div>

        <div id="statsArea" class="stats-area">
          <span id="pps">0</span> packets/sec | Quality:
          <span id="quality" class="quality-good">good</span>
          <div id="statsDetails" class="stats-details">
            <div>Latency: <span id="latency">--</span></div>
            <div>Total packets: <span id="totalPackets">0</span></div>
            <div>Buffer underruns: <span id="underruns">0</span></div>
          </div>
        </div>

        <div id="errorContainer"></div>
      </div>
    </div>

    <footer>
      <div class="footer-badge">
        <span>PartyOn</span>
        <a href="/dashboard" title="Server Dashboard">Dashboard</a>
        <a
          href="https://github.com/mayurkoli8"
          target="_blank"
          rel="noopener noreferrer"
          title="GitHub"
        >
          <svg
            class="gh"
            viewBox="0 0 16 16"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2 .37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.13 0 0 .67-.21 2.2.82a7.6 7.6 0 012 0c1.53-1.03 2.2-.82 2.2-.82.44 1.11.16 1.93.08 2.13.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38C13.71 14.53 16 11.54 16 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </a>
      </div>
    </footer>

    <!-- ES6 Module entry point -->
    <script type="module" src="/static/js/ui.js"></script>
  </body>
</html>
