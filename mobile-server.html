<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0f1724" />
    <title>PartyOn - Mobile Server</title>

    <style>
      :root {
        --accent1: #00e676;
        --accent2: #00c853;
        --glass: rgba(255, 255, 255, 0.06);
        --text: #eef6f9;
        --danger: #ff5252;
        --warning: #ffc107;
        --success: #00e676;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Poppins", Arial,
          sans-serif;
        background:
          radial-gradient(
            1000px 600px at 10% 20%,
            rgba(0, 0, 0, 0.18),
            transparent
          ),
          linear-gradient(135deg, #0f1724 0%, #1f1c2c 35%, #5b4666 100%);
        background-attachment: fixed;
        color: var(--text);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding: var(--spacing-md);
      }

      .blob {
        position: fixed;
        filter: blur(60px);
        opacity: 0.45;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 0;
      }

      .blob.b1 {
        width: 300px;
        height: 300px;
        background: linear-gradient(45deg, #8c6cff, #00e5ff);
        left: -10%;
        top: -15%;
      }

      .blob.b2 {
        width: 250px;
        height: 250px;
        background: linear-gradient(45deg, #00e676, #00c853);
        right: -8%;
        bottom: -20%;
      }

      .container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 2;
      }

      .card {
        width: 100%;
        max-width: 500px;
        backdrop-filter: blur(12px) saturate(120%);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.02)
        );
        border-radius: var(--radius);
        box-shadow:
          0 30px 80px rgba(3, 6, 23, 0.65),
          inset 0 1px 0 rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        padding: var(--spacing-lg);
        text-align: center;
      }

      h1 {
        font-size: clamp(24px, 8vw, 28px);
        margin: 0 0 8px 0;
        font-weight: 700;
      }

      .sub {
        font-size: clamp(12px, 3vw, 14px);
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: var(--spacing-lg);
      }

      .btn {
        padding: clamp(12px, 4vw, 16px) clamp(16px, 5vw, 20px);
        font-size: clamp(14px, 4vw, 16px);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        margin-bottom: var(--spacing-md);
      }

      .btn-primary {
        background: linear-gradient(90deg, var(--accent1), var(--accent2));
        color: #021009;
        box-shadow: 0 8px 28px rgba(2, 200, 118, 0.12);
      }

      .btn-primary:hover {
        box-shadow: 0 14px 40px rgba(2, 200, 118, 0.14);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-stop {
        background: rgba(255, 82, 82, 0.2);
        color: var(--danger);
        border: 1px solid rgba(255, 82, 82, 0.3);
      }

      .btn-stop:hover {
        background: rgba(255, 82, 82, 0.3);
      }

      .status-section {
        margin: var(--spacing-lg) 0;
        padding: var(--spacing-md);
        background: rgba(255, 255, 255, 0.04);
        border-radius: var(--radius);
        text-align: left;
      }

      .status-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 4px;
      }

      .status-value {
        font-size: clamp(14px, 4vw, 16px);
        font-weight: 600;
        color: var(--text);
        word-break: break-all;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 8px;
      }

      .status-badge.online {
        background: rgba(0, 230, 118, 0.2);
        color: var(--success);
      }

      .status-badge.offline {
        background: rgba(255, 82, 82, 0.2);
        color: var(--danger);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .status-dot.online {
        background: var(--success);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .stats {
        margin: var(--spacing-md) 0;
        padding: var(--spacing-md);
        background: rgba(255, 255, 255, 0.04);
        border-radius: var(--radius);
        font-size: 12px;
        text-align: left;
      }

      .stat-item {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }

      .stat-item:last-child {
        border-bottom: none;
      }

      .stat-label {
        color: rgba(255, 255, 255, 0.6);
      }

      .stat-value {
        color: var(--accent1);
        font-weight: 600;
      }

      .error-msg {
        background: rgba(255, 82, 82, 0.1);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: var(--danger);
        padding: var(--spacing-md);
        border-radius: var(--radius);
        margin: var(--spacing-md) 0;
        font-size: 12px;
        word-break: break-word;
      }

      .success-msg {
        background: rgba(0, 230, 118, 0.1);
        border: 1px solid rgba(0, 230, 118, 0.3);
        color: var(--success);
        padding: var(--spacing-md);
        border-radius: var(--radius);
        margin: var(--spacing-md) 0;
        font-size: 12px;
      }

      .info-box {
        background: rgba(255, 255, 255, 0.04);
        padding: var(--spacing-md);
        border-radius: var(--radius);
        margin: var(--spacing-md) 0;
        font-size: 12px;
        line-height: 1.6;
        text-align: left;
      }

      @media (max-width: 480px) {
        body {
          padding: 12px;
        }

        .card {
          padding: var(--spacing-md);
        }
      }
    </style>
  </head>

  <body>
    <div class="blob b1" aria-hidden="true"></div>
    <div class="blob b2" aria-hidden="true"></div>

    <div class="container">
      <div class="card">
        <h1>PartyOn Mobile</h1>
        <div class="sub">Use your phone's microphone as audio server</div>

        <button id="startBtn" class="btn btn-primary">
          <span>🎤 Start Streaming</span>
        </button>

        <button id="stopBtn" class="btn btn-stop" style="display: none">
          <span>⏹️ Stop Streaming</span>
        </button>

        <div id="statusSection" class="status-section" style="display: none">
          <div class="status-label">Server Status</div>
          <div id="statusValue" class="status-value">Initializing...</div>
          <div id="statusBadge" class="status-badge offline">
            <div class="status-dot offline"></div>
            <span>Offline</span>
          </div>
        </div>

        <div id="statsSection" class="stats" style="display: none">
          <div class="stat-item">
            <div class="stat-label">Audio Samples</div>
            <div class="stat-value" id="sampleCount">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Duration</div>
            <div class="stat-value" id="duration">00:00</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Bitrate</div>
            <div class="stat-value" id="bitrate">-- kb/s</div>
          </div>
        </div>

        <div id="errorContainer"></div>

        <div class="info-box" id="infoBox" style="display: none">
          <strong>📱 Connection Info:</strong><br />
          <div id="connectionInfo" style="margin-top: 8px">
            <div style="margin: 4px 0">
              Server IP: <span id="serverIp">--</span>
            </div>
            <div style="margin: 4px 0">
              Status: <span id="serverStatus">Offline</span>
            </div>
          </div>
        </div>

        <div
          id="message"
          style="
            margin-top: var(--spacing-md);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
          "
        ></div>
      </div>
    </div>

    <script>
      class MobileAudioServer {
        constructor() {
          this.audioContext = null;
          this.mediaStream = null;
          this.audioData = [];
          this.isStreaming = false;
          this.sampleCount = 0;
          this.startTime = null;
          this.serverSocket = null;
        }

        async start() {
          try {
            // Request microphone access
            this.mediaStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false,
              },
            });

            this.audioContext = new (
              window.AudioContext || window.webkitAudioContext
            )();
            const source = this.audioContext.createMediaStreamSource(
              this.mediaStream,
            );
            const analyser = this.audioContext.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            this.isStreaming = true;
            this.startTime = Date.now();

            this.captureAudio(analyser);
            return true;
          } catch (err) {
            console.error("Error accessing microphone:", err);
            throw new Error(
              "Microphone access denied. Please allow microphone permission.",
            );
          }
        }

        captureAudio(analyser) {
          if (!this.isStreaming) return;

          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(dataArray);

          this.sampleCount++;
          this.audioData.push(Array.from(dataArray));

          if (this.audioData.length > 100) {
            this.audioData.shift();
          }

          requestAnimationFrame(() => this.captureAudio(analyser));
        }

        stop() {
          this.isStreaming = false;
          if (this.mediaStream) {
            this.mediaStream.getTracks().forEach((track) => track.stop());
          }
          if (this.audioContext) {
            this.audioContext.close();
          }
        }

        getStats() {
          const duration = this.startTime
            ? Math.floor((Date.now() - this.startTime) / 1000)
            : 0;
          const bitrate =
            this.sampleCount > 0
              ? Math.round((this.sampleCount * 16) / Math.max(1, duration))
              : 0;

          return {
            sampleCount: this.sampleCount,
            duration: `${String(Math.floor(duration / 60)).padStart(2, "0")}:${String(duration % 60).padStart(2, "0")}`,
            bitrate: `${bitrate} kb/s`,
            isStreaming: this.isStreaming,
          };
        }
      }

      // Initialize
      const server = new MobileAudioServer();
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const statusSection = document.getElementById("statusSection");
      const statsSection = document.getElementById("statsSection");
      const errorContainer = document.getElementById("errorContainer");
      const infoBox = document.getElementById("infoBox");

      function showError(msg) {
        const div = document.createElement("div");
        div.className = "error-msg";
        div.textContent = msg;
        errorContainer.innerHTML = "";
        errorContainer.appendChild(div);
      }

      function showSuccess(msg) {
        const div = document.createElement("div");
        div.className = "success-msg";
        div.textContent = msg;
        errorContainer.innerHTML = "";
        errorContainer.appendChild(div);
      }

      function updateUI() {
        const stats = server.getStats();

        if (stats.isStreaming) {
          startBtn.style.display = "none";
          stopBtn.style.display = "flex";
          statusSection.style.display = "block";
          statsSection.style.display = "block";
          infoBox.style.display = "block";

          // Update status
          document.getElementById("statusBadge").className =
            "status-badge online";
          document.getElementById("statusBadge").innerHTML =
            '<div class="status-dot online"></div><span>Streaming</span>';
          document.getElementById("serverStatus").textContent = "Streaming";

          // Update stats
          document.getElementById("sampleCount").textContent =
            stats.sampleCount.toLocaleString();
          document.getElementById("duration").textContent = stats.duration;
          document.getElementById("bitrate").textContent = stats.bitrate;
        } else {
          startBtn.style.display = "flex";
          stopBtn.style.display = "none";
          statusSection.style.display = "none";
          statsSection.style.display = "none";
          infoBox.style.display = "none";
        }
      }

      startBtn.addEventListener("click", async () => {
        try {
          startBtn.disabled = true;
          startBtn.textContent = "⏳ Requesting Microphone...";

          await server.start();

          showSuccess(
            "✅ Mobile server started! Streaming audio from microphone.",
          );
          updateUI();

          // Update UI every 500ms
          setInterval(updateUI, 500);
        } catch (err) {
          showError("❌ Error: " + err.message);
          startBtn.disabled = false;
          startBtn.textContent = "🎤 Start Streaming";
        }
      });

      stopBtn.addEventListener("click", () => {
        server.stop();
        errorContainer.innerHTML = "";
        updateUI();
      });

      // Get local IP (for reference)
      async function getLocalIP() {
        try {
          const response = await fetch("https://api.ipify.org?format=json");
          const data = await response.json();
          document.getElementById("serverIp").textContent =
            data.ip || "Unknown";
        } catch {
          document.getElementById("serverIp").textContent = "Unable to fetch";
        }
      }

      // Initial setup
      getLocalIP();
    </script>
  </body>
</html>
